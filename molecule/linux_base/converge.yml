---
- name: Converge
  hosts: all
  become: true
  vars:
    # Skip the first-run bootstrap tasks: the ephemeral molecule inventory has
    # no ssh_keys/ dir and setting the hostname / removing cloud-init is out of
    # scope for the base test.
    linux_base_bootstrap: false
  roles:
    - linux_base
  # To converge only a subset of linux_base, run molecule with tags, e.g.:
  #   molecule converge -s linux_base -- --tags timezone
