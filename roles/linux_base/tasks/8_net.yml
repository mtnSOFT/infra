---
- name: Disable IPv6 via sysctl
  sysctl: 
    name: "{{ sysctl_param }}"
    value: "1"
    state: present
    sysctl_set: true
    reload: true
  loop: 
    - net.ipv6.conf.all.disable_ipv6
    - net.ipv6.conf.default.disable_ipv6
    - net.ipv6.conf.lo.disable_ipv6
  loop_control:
    loop_var: sysctl_param
  when: disable_ipv6

- name: Ensure IPv6 is disabled in /etc/sysctl.conf
  become: true
  lineinfile:
    path: /etc/sysctl.conf
    regexp: "^{{ sysctl_setting }}"
    line: "{{ sysctl_setting }} = 1"
    state: present
  loop:
    - net. ipv6.conf.all. disable_ipv6
    - net.ipv6.conf. default.disable_ipv6
    - net.ipv6.conf.lo.disable_ipv6
  loop_control:
    loop_var: sysctl_setting
  when: disable_ipv6

- name: Check whether systemd-resolved is active
  ansible.builtin.command: systemctl is-active systemd-resolved
  register: systemd_resolved
  changed_when: false
  failed_when: false

- name: Ensure systemd-resolved drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - internal_zone_name is defined
    - systemd_resolved.stdout == "active"

- name: Set internal zone as default DNS search suffix
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/10-internal-search-domain.conf
    content: |
      [Resolve]
      Domains={{ internal_zone_name }}
    owner: root
    group: root
    mode: "0644"
  when:
    - internal_zone_name is defined
    - systemd_resolved.stdout == "active"
  notify: Restart systemd-resolved
