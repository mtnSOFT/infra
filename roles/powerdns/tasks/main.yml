---
# Task files run in order. Tags let you run a subset, e.g. `--tags install`.
# To add a task file, drop it in this folder and add an import below.

- import_tasks: 1_install.yml
  tags: [install]

- import_tasks: 2_config-zones.yml
  tags: [config-zones]

- import_tasks: 3_recursor.yml
  when: powerdns_recursor_enabled | bool
  tags: [recursor]
