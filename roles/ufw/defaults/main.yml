---
# Enable or disable UFW
ufw_enabled: true

# Reset UFW rules before applying new ones
ufw_reset: true

# Default policies
ufw_default_policy_incoming: deny
ufw_default_policy_outgoing: allow
ufw_default_policy_routed: deny

# Logging level: on, off, low, medium, high, full
ufw_logging_level: low

# Default rules applied to all hosts
ufw_default_rules:
  - rule: allow
    port: "{{ sshd_port | default(22) }}"
    proto: tcp
    from_ip: "{{ server_lan_cidr }}"
    comment: "SSH access"

# Group-specific rules (define in group_vars)
ufw_group_rules: []

# Host-specific rules (define in host_vars)
ufw_host_rules: []

# UFW application profiles to allow
ufw_applications: []

# networks
server_lan_cidr: "10.0.0.0/24"
lan_cidr: "192.168.1.0/24"

# --- NAT / masquerading ---
# Masquerade the server LAN out through the upstream LAN interface so it reaches
# the Internet via this router (server LAN -> router -> LAN -> upstream router).
# Enable per-router in group_vars/host_vars.
server_lan_nat: false
# Upstream LAN-facing interface that server LAN traffic is masqueraded out of.
lan_interface: "eth0"

# Extra masquerade rules, rendered into the same *nat block. Each entry is a
# mapping { source: <cidr>, out_interface: <egress iface> }.
ufw_nat_rules: []
