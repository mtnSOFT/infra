---
# Build the list of masquerade rules from every NAT source, then render them
# into a single *nat block in before.rules. UFW/iptables-restore allows only one
# *nat table, so every MASQUERADE rule must share the same block.
#
# Each rule is a mapping: { source: <cidr>, out_interface: <egress iface> }.
# Sources, in order:
#   - ufw_nat_rules        explicit, arbitrary rules
#   - server_lan_nat       server LAN -> upstream LAN (this router as gateway)
#   - wireguard_subnet     VPN clients -> upstream (kept for backwards compat)
- name: Build masquerade rule list
  ansible.builtin.set_fact:
    _ufw_masquerade_rules: >-
      {{ (ufw_nat_rules | default([]))
         + ([{'source': server_lan_cidr, 'out_interface': lan_interface}]
            if (server_lan_nat | default(false) | bool) else [])
         + ([{'source': wireguard_subnet, 'out_interface': wireguard_external_interface}]
            if (wireguard_subnet is defined) else []) }}

- name: Configure UFW NAT masquerading
  when: _ufw_masquerade_rules | length > 0
  block:
    - name: Remove legacy WireGuard-only NAT block (folded into the unified block)
      ansible.builtin.blockinfile:
        path: /etc/ufw/before.rules
        marker: "# {mark} ANSIBLE MANAGED BLOCK - WireGuard NAT"
        state: absent

    - name: Render NAT masquerade rules into before.rules
      ansible.builtin.blockinfile:
        path: /etc/ufw/before.rules
        insertbefore: '^\*filter'
        marker: "# {mark} ANSIBLE MANAGED BLOCK - UFW NAT"
        block: |
          # NAT table rules (masquerade) - Ansible managed
          *nat
          :POSTROUTING ACCEPT [0:0]
          {% for rule in _ufw_masquerade_rules %}
          -A POSTROUTING -s {{ rule.source }} -o {{ rule.out_interface }} -j MASQUERADE
          {% endfor %}
          COMMIT
        backup: yes

    # Permit the forwarded traffic itself. Forwarding stays default-deny
    # (ufw_default_policy_routed); each masqueraded source is allowed out to
    # anywhere with an explicit `ufw route allow from <cidr>`.
    - name: Allow forwarding from each masqueraded source to anywhere
      community.general.ufw:
        route: true
        rule: allow
        from_ip: "{{ nat_rule.source }}"
        comment: "NAT forward: {{ nat_rule.source }} to anywhere"
      loop: "{{ _ufw_masquerade_rules }}"
      loop_control:
        loop_var: nat_rule
        label: "{{ nat_rule.source }}"

  rescue:
    - name: UFW NAT configuration failed on host
      ansible.builtin.debug:
        msg:
          - "UFW NAT config block failed on host {{ inventory_hostname }}."
          - "Review earlier task output for the root cause."

    - name: Fail explicitly after UFW NAT config error
      ansible.builtin.fail:
        msg: "UFW NAT configuration failed on {{ inventory_hostname }}."
